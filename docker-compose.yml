version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cbt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cbtuser
      POSTGRES_PASSWORD: cbtpassword
      POSTGRES_DB: cbt_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cbtuser -d cbt_db']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cbt-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cbt-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://cbtuser:cbtpassword@postgres:5432/cbt_db?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000,http://web:3000
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: change-me-too
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: change-me-change-me-change-me-32
      THROTTLE_LIMIT: 60
      THROTTLE_TTL: 60000
    ports:
      - '3001:3001'
    volumes:
      - api_uploads:/app/uploads
    command: ['node', 'dist/main']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        NEXT_PUBLIC_WS_URL: http://localhost:3001
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_DEBUG: 'false'
    container_name: cbt-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_DEBUG: 'false'
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
  api_uploads:
